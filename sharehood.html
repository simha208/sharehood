<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>ShareHood</title>
<script src="https://accounts.google.com/gsi/client" async></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
*{box-sizing:border-box;margin:0;padding:0;}
:root{
  --brand:#18A873;--brand-dark:#0F7A54;--brand-light:#E8F8F1;--brand-mid:#d0f0e2;
  --bg:#F5F6F8;--white:#fff;
  --g50:#F8F9FB;--g100:#EEF0F4;--g200:#DDE1E9;--g400:#9CA3AF;--g600:#6B7280;--g800:#1F2937;--g900:#111827;
  --r:12px;--rl:16px;--rxl:20px;
  --sh:0 1px 4px rgba(0,0,0,.06),0 1px 2px rgba(0,0,0,.04);
  --shm:0 4px 16px rgba(0,0,0,.08),0 2px 6px rgba(0,0,0,.04);
  --shl:0 8px 32px rgba(0,0,0,.10),0 4px 12px rgba(0,0,0,.05);
  --shb:0 4px 20px rgba(24,168,115,.28);
}
body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--g800);}
.layout{display:grid;grid-template-columns:240px 1fr;min-height:100vh;}
.sidebar{background:var(--white);border-right:1px solid var(--g100);display:flex;flex-direction:column;position:sticky;top:0;height:100vh;}
.main{min-width:0;display:flex;flex-direction:column;}
.sb-logo{padding:24px 20px 18px;display:flex;align-items:center;gap:10px;border-bottom:1px solid var(--g100);}
.sb-logo-mark{width:36px;height:36px;border-radius:10px;background:var(--brand);display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.sb-logo-mark svg{width:20px;height:20px;stroke:#fff;stroke-width:2.5;fill:none;}
.sb-logo-text{font-size:18px;font-weight:700;color:var(--g900);}
.sb-nav{flex:1;padding:14px 10px;display:flex;flex-direction:column;gap:2px;overflow-y:auto;}
.sb-sec{font-size:11px;font-weight:600;color:var(--g400);letter-spacing:.06em;text-transform:uppercase;padding:12px 12px 5px;}
.sb-item{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:10px;cursor:pointer;font-size:14px;font-weight:500;color:var(--g600);border:none;background:none;width:100%;text-align:right;transition:all .15s;}
.sb-item:hover{background:var(--g50);color:var(--g800);}
.sb-item.active{background:var(--brand-light);color:var(--brand);}
.sb-item.active svg{stroke:var(--brand);}
.sb-item svg{width:18px;height:18px;stroke:var(--g400);fill:none;flex-shrink:0;}
.sb-item:hover svg{stroke:var(--g600);}
.sb-badge{margin-right:auto;margin-left:0;background:var(--brand);color:#fff;border-radius:20px;font-size:11px;font-weight:700;padding:2px 8px;}
.sb-add{margin:0 10px 14px;padding:12px;border-radius:var(--rl);border:none;background:var(--brand);color:#fff;font-size:14px;font-weight:600;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;box-shadow:var(--shb);transition:all .2s;}
.sb-add:hover{background:var(--brand-dark);}
.sb-add svg{width:16px;height:16px;stroke:#fff;fill:none;stroke-width:2.5;}
.sb-user{padding:14px;border-top:1px solid var(--g100);display:flex;align-items:center;gap:10px;cursor:pointer;}
.sb-user:hover{background:var(--g50);}
.sb-av{width:36px;height:36px;border-radius:10px;background:var(--brand-light);display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;color:var(--brand);flex-shrink:0;overflow:hidden;}
.sb-av img{width:100%;height:100%;object-fit:cover;}
.sb-user-name{font-size:13px;font-weight:600;color:var(--g800);flex:1;min-width:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.sb-cog{width:28px;height:28px;border-radius:8px;display:flex;align-items:center;justify-content:center;color:var(--g400);border:none;background:none;cursor:pointer;flex-shrink:0;}
.sb-cog:hover{background:var(--g100);color:var(--g600);}
.sb-cog svg{width:16px;height:16px;stroke:currentColor;fill:none;}
.topbar{background:var(--white);border-bottom:1px solid var(--g100);padding:0 28px;height:64px;display:flex;align-items:center;gap:14px;position:sticky;top:0;z-index:10;}
.topbar-search{flex:1;max-width:480px;display:flex;align-items:center;gap:10px;background:var(--g50);border:1.5px solid var(--g100);border-radius:var(--rl);padding:0 14px;height:40px;transition:all .2s;}
.topbar-search:focus-within{border-color:var(--brand);background:var(--white);box-shadow:0 0 0 3px rgba(24,168,115,.1);}
.topbar-search input{border:none;background:transparent;flex:1;font-size:14px;font-family:'Inter',sans-serif;color:var(--g800);outline:none;}
.topbar-search input::placeholder{color:var(--g400);}
.topbar-search svg{width:16px;height:16px;stroke:var(--g400);fill:none;flex-shrink:0;}
.topbar-right{margin-right:0;margin-left:auto;display:flex;align-items:center;gap:10px;}
.icon-btn{width:38px;height:38px;border-radius:10px;background:var(--g50);border:1.5px solid var(--g100);display:flex;align-items:center;justify-content:center;cursor:pointer;position:relative;color:var(--g600);}
.icon-btn svg{width:18px;height:18px;stroke:currentColor;fill:none;}
.notif-dot{position:absolute;top:7px;right:7px;width:7px;height:7px;border-radius:50%;background:#EF4444;border:1.5px solid var(--white);}
.top-av{width:36px;height:36px;border-radius:10px;overflow:hidden;cursor:pointer;background:var(--brand-light);display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;color:var(--brand);}
.top-av img{width:100%;height:100%;object-fit:cover;}
.page{padding:28px 32px;flex:1;overflow-y:auto;}
.page-title{font-size:24px;font-weight:700;color:var(--g900);}
.page-sub{font-size:14px;color:var(--g400);margin-top:3px;}
.stats-row{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin:22px 0 26px;}
.stat-card{background:var(--white);border-radius:var(--rl);padding:18px;box-shadow:var(--sh);}
.stat-num{font-size:26px;font-weight:700;color:var(--g900);}
.stat-lbl{font-size:12px;color:var(--g400);margin-top:3px;}
.stat-trend{font-size:11px;color:var(--brand);font-weight:600;margin-top:5px;}
.cats{display:flex;gap:8px;margin-bottom:22px;flex-wrap:wrap;}
.cat-chip{display:inline-flex;align-items:center;gap:6px;padding:8px 16px;border-radius:10px;border:1.5px solid var(--g200);background:var(--white);font-size:13px;font-weight:500;color:var(--g600);cursor:pointer;transition:all .15s;}
.cat-chip:hover{border-color:var(--brand);color:var(--brand);}
.cat-chip.active{background:var(--brand);color:#fff;border-color:var(--brand);box-shadow:var(--shb);}
.sec-hdr{font-size:13px;font-weight:700;color:var(--g900);margin-bottom:14px;display:flex;align-items:center;justify-content:space-between;}
.see-all{font-size:13px;font-weight:600;color:var(--brand);cursor:pointer;}
.items-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:18px;margin-bottom:30px;}
.item-card{background:var(--white);border-radius:var(--rxl);overflow:hidden;box-shadow:var(--sh);cursor:pointer;transition:all .22s;border:1px solid transparent;}
.item-card:hover{transform:translateY(-4px);box-shadow:var(--shm);border-color:var(--g100);}
.item-card[style*="display:none"]{display:none!important;}
.ic-img{width:100%;height:160px;display:flex;align-items:center;justify-content:center;position:relative;}
.ic-img svg{width:52px;height:52px;opacity:.5;fill:none;}
.ic-tools{background:linear-gradient(135deg,#EEF2FF,#C7D2FE);}
.ic-sports{background:linear-gradient(135deg,#F0FDF4,#BBF7D0);}
.ic-books{background:linear-gradient(135deg,#FFF7ED,#FED7AA);}
.ic-tech{background:linear-gradient(135deg,#F0F9FF,#BAE6FD);}
.ic-home{background:linear-gradient(135deg,#FFF1F2,#FECDD3);}
.fav-btn{position:absolute;top:10px;left:10px;width:32px;height:32px;border-radius:10px;background:rgba(255,255,255,.85);backdrop-filter:blur(8px);display:flex;align-items:center;justify-content:center;border:none;cursor:pointer;transition:all .15s;}
.fav-btn:hover{transform:scale(1.1);}
.fav-btn svg{width:14px;height:14px;fill:none;stroke:#9CA3AF;transition:all .15s;}
.fav-btn.liked svg{stroke:#EF4444;fill:#EF4444;}
.avail{position:absolute;top:10px;right:10px;}
.ic-body{padding:12px 14px 14px;}
.ic-title{font-size:14px;font-weight:600;color:var(--g900);margin-bottom:3px;}
.ic-loc{display:flex;align-items:center;gap:4px;font-size:12px;color:var(--g400);margin-bottom:9px;}
.ic-loc svg{width:11px;height:11px;fill:none;stroke:currentColor;}
.ic-footer{display:flex;align-items:center;justify-content:space-between;}
.ow-row{display:flex;align-items:center;gap:6px;}
.ow-av{width:22px;height:22px;border-radius:7px;display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:700;}
.ow-name{font-size:11px;font-weight:500;color:var(--g600);}
.borrow-btn{background:var(--brand-light);color:var(--brand);border:none;border-radius:8px;padding:6px 13px;font-size:12px;font-weight:600;cursor:pointer;transition:all .15s;}
.borrow-btn:hover{background:var(--brand);color:#fff;}
.borrow-btn:disabled{background:var(--g100);color:var(--g400);cursor:not-allowed;}
.badge{display:inline-flex;align-items:center;gap:4px;padding:3px 9px;border-radius:7px;font-size:11px;font-weight:600;}
.b-green{background:#ECFDF5;color:#065F46;}
.b-amber{background:#FFFBEB;color:#92400E;}
.b-gray{background:var(--g100);color:var(--g600);}
.b-blue{background:#EFF6FF;color:#1D4ED8;}
.btn{display:flex;align-items:center;justify-content:center;gap:8px;padding:12px 22px;border-radius:var(--rl);font-size:14px;font-weight:600;cursor:pointer;border:none;transition:all .2s;font-family:'Inter',sans-serif;width:100%;}
.btn+.btn{margin-top:10px;}
.btn-primary{background:var(--brand);color:#fff;box-shadow:var(--shb);}
.btn-primary:hover{background:var(--brand-dark);}
.btn-primary:disabled{background:var(--g200);color:var(--g400);cursor:not-allowed;box-shadow:none;}
.btn-secondary{background:var(--brand-light);color:var(--brand);}
.btn-secondary:hover{background:var(--brand-mid);}
.btn-outline{background:#fff;color:var(--g800);border:1.5px solid var(--g200);}
.btn-outline:hover{background:var(--g50);}
.btn svg{width:16px;height:16px;stroke:currentColor;fill:none;stroke-width:2.5;}
.btn-danger{background:#FEF2F2;color:#B91C1C;border:1.5px solid #FECACA;}
.btn-danger:hover{background:#FEE2E2;}

/* AUTH */
.auth-wrap{min-height:100vh;display:grid;grid-template-columns:1fr 500px;}
.auth-left{background:linear-gradient(145deg,#18A873 0%,#0F7A54 60%,#085041 100%);display:flex;flex-direction:column;align-items:flex-start;justify-content:center;padding:60px;}
.auth-left h1{font-size:40px;font-weight:800;color:#fff;letter-spacing:-1.5px;line-height:1.15;}
.auth-left p{font-size:15px;color:rgba(255,255,255,.75);margin-top:12px;line-height:1.6;max-width:320px;}
.auth-badge{background:rgba(255,255,255,.15);border:1px solid rgba(255,255,255,.25);border-radius:14px;padding:14px 18px;display:flex;align-items:center;gap:12px;margin-top:32px;}
.auth-badge svg{width:20px;height:20px;stroke:#fff;fill:none;}
.auth-badge span{font-size:13px;color:#fff;font-weight:500;}
.auth-right{padding:52px 48px;display:flex;flex-direction:column;justify-content:center;background:#fff;overflow-y:auto;}
.auth-right h2{font-size:26px;font-weight:700;color:var(--g900);margin-bottom:5px;}
.auth-right .auth-sub{font-size:14px;color:var(--g400);margin-bottom:28px;}
.form-group{margin-bottom:16px;}
.form-label{display:block;font-size:13px;font-weight:600;color:var(--g800);margin-bottom:6px;}
.form-input{width:100%;padding:11px 14px;border:1.5px solid var(--g200);border-radius:var(--r);font-size:14px;font-family:'Inter',sans-serif;color:var(--g800);background:#fff;transition:all .2s;outline:none;}
.form-input:focus{border-color:var(--brand);box-shadow:0 0 0 3px rgba(24,168,115,.12);}
.form-input::placeholder{color:var(--g400);}
textarea.form-input{resize:vertical;min-height:90px;}
.auth-div{display:flex;align-items:center;gap:12px;margin:18px 0;}
.auth-div span{font-size:13px;color:var(--g400);white-space:nowrap;}
.auth-div::before,.auth-div::after{content:'';flex:1;height:1px;background:var(--g200);}
.google-btn{display:flex;align-items:center;justify-content:center;gap:10px;width:100%;padding:12px;border:1.5px solid var(--g200);border-radius:var(--rl);background:#fff;font-size:14px;font-weight:600;color:var(--g800);cursor:pointer;transition:all .2s;font-family:'Inter',sans-serif;}
.google-btn:hover{background:var(--g50);box-shadow:var(--sh);}
.auth-switch{font-size:14px;color:var(--g600);margin-top:18px;text-align:center;}
.auth-switch a{color:var(--brand);font-weight:600;cursor:pointer;}
.msg-box{padding:11px 14px;border-radius:var(--r);font-size:13px;font-weight:500;margin-bottom:14px;}
.msg-err{background:#FEF2F2;color:#B91C1C;border:1px solid #FECACA;}
.msg-ok{background:#ECFDF5;color:#065F46;border:1px solid #A7F3D0;}

/* PROFILE */
.profile-hdr{background:linear-gradient(135deg,#18A873,#0F7A54);border-radius:var(--rxl);padding:28px;color:#fff;margin-bottom:22px;}
.profile-av-lg{width:68px;height:68px;border-radius:18px;background:rgba(255,255,255,.2);border:3px solid rgba(255,255,255,.4);display:flex;align-items:center;justify-content:center;font-size:24px;font-weight:700;color:#fff;margin-bottom:12px;overflow:hidden;}
.profile-av-lg img{width:100%;height:100%;object-fit:cover;}
.profile-name-lg{font-size:22px;font-weight:700;color:#fff;}
.profile-meta{font-size:13px;color:rgba(255,255,255,.7);margin-top:3px;}
.profile-stats{display:flex;gap:22px;margin-top:16px;}
.ps-num{font-size:20px;font-weight:700;color:#fff;}
.ps-lbl{font-size:11px;color:rgba(255,255,255,.65);margin-top:1px;}
.profile-layout{display:grid;grid-template-columns:1fr 290px;gap:22px;align-items:start;}
.karma-card{background:linear-gradient(135deg,#18A873,#0F7A54);border-radius:var(--rl);padding:18px;color:#fff;margin-bottom:14px;}
.karma-card h3{font-size:12px;font-weight:500;opacity:.75;margin-bottom:5px;}
.karma-score{font-size:32px;font-weight:700;}
.karma-bar-bg{background:rgba(255,255,255,.2);height:6px;border-radius:6px;margin-top:10px;}
.karma-bar{background:#fff;height:6px;border-radius:6px;}
.karma-next{font-size:11px;opacity:.65;margin-top:7px;}
.ach-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px;}
.ach-card{background:#fff;border-radius:var(--rl);padding:12px;display:flex;align-items:center;gap:10px;box-shadow:var(--sh);}
.ach-icon{width:34px;height:34px;border-radius:10px;background:var(--brand-light);display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.ach-icon svg{width:16px;height:16px;stroke:var(--brand);fill:none;}
.ach-label{font-size:12px;font-weight:600;color:var(--g800);}
.my-items-list{display:flex;flex-direction:column;gap:10px;}
.my-item-row{background:#fff;border-radius:var(--rl);padding:14px;display:flex;align-items:center;gap:12px;box-shadow:var(--sh);transition:box-shadow .2s;}
.my-item-row:hover{box-shadow:var(--shm);}
.my-item-img{width:50px;height:50px;border-radius:12px;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.my-item-title{font-size:14px;font-weight:600;color:var(--g900);}
.my-item-sub{font-size:12px;color:var(--g400);margin-top:2px;}
.my-item-actions{margin-right:0;margin-left:auto;display:flex;align-items:center;gap:8px;}
.sw{width:40px;height:22px;border-radius:11px;background:var(--brand);position:relative;cursor:pointer;flex-shrink:0;transition:background .2s;}
.sw.off{background:var(--g200);}
.sw-t{width:18px;height:18px;border-radius:50%;background:#fff;position:absolute;top:2px;right:2px;transition:all .2s;box-shadow:0 1px 3px rgba(0,0,0,.15);}
.sw.off .sw-t{right:auto;left:2px;}
.edit-btn{padding:5px 12px;border-radius:8px;border:1.5px solid var(--g200);background:#fff;font-size:12px;font-weight:600;color:var(--g600);cursor:pointer;}
.edit-btn:hover{border-color:var(--brand);color:var(--brand);}

/* MESSAGES */
.msg-layout{display:grid;grid-template-columns:300px 1fr;height:calc(100vh - 64px);overflow:hidden;}
.msg-sb{border-right:1px solid var(--g100);display:flex;flex-direction:column;overflow:hidden;background:#fff;}
.msg-sb-hdr{padding:18px;border-bottom:1px solid var(--g100);}
.msg-sb-hdr h3{font-size:15px;font-weight:700;color:var(--g900);margin-bottom:10px;}
.msg-search{display:flex;align-items:center;gap:8px;background:var(--g50);border:1.5px solid var(--g100);border-radius:10px;padding:8px 12px;}
.msg-search svg{width:14px;height:14px;stroke:var(--g400);fill:none;flex-shrink:0;}
.msg-search input{border:none;background:transparent;font-size:13px;font-family:'Inter',sans-serif;outline:none;flex:1;color:var(--g800);}
.msg-list{overflow-y:auto;flex:1;}
.msg-item{display:flex;gap:10px;padding:12px 18px;cursor:pointer;border-bottom:1px solid var(--g50);transition:background .12s;align-items:center;}
.msg-item:hover,.msg-item.active{background:var(--g50);}
.msg-av{width:42px;height:42px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:700;flex-shrink:0;}
.msg-content{flex:1;min-width:0;}
.msg-name{font-size:14px;font-weight:600;color:var(--g900);}
.msg-preview{font-size:12px;color:var(--g400);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-top:2px;}
.msg-time{font-size:11px;color:var(--g400);flex-shrink:0;}
.msg-unread{width:8px;height:8px;border-radius:50%;background:var(--brand);flex-shrink:0;}
.chat-area{display:flex;flex-direction:column;overflow:hidden;background:#fff;}
.chat-hdr{padding:14px 22px;border-bottom:1px solid var(--g100);display:flex;align-items:center;gap:12px;}
.chat-hdr-av{width:36px;height:36px;border-radius:11px;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:13px;flex-shrink:0;}
.chat-hdr-name{font-size:14px;font-weight:600;color:var(--g900);}
.chat-hdr-item{font-size:12px;color:var(--g400);margin-top:1px;}
.chat-msgs{flex:1;overflow-y:auto;padding:18px 22px;display:flex;flex-direction:column;gap:12px;background:var(--g50);}
.bubble{max-width:68%;padding:11px 15px;border-radius:14px;font-size:13px;line-height:1.5;word-break:break-word;}
.bubble.them{background:#fff;color:var(--g800);border-bottom-left-radius:4px;align-self:flex-start;box-shadow:var(--sh);}
.bubble.me{background:var(--brand);color:#fff;border-bottom-right-radius:4px;align-self:flex-end;}
.chat-input-area{padding:14px 22px;border-top:1px solid var(--g100);display:flex;gap:10px;align-items:center;}
.chat-input{flex:1;padding:10px 14px;border:1.5px solid var(--g200);border-radius:12px;font-size:14px;font-family:'Inter',sans-serif;outline:none;transition:border-color .2s;}
.chat-input:focus{border-color:var(--brand);}
.chat-send{width:38px;height:38px;border-radius:10px;background:var(--brand);border:none;display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0;}
.chat-send:hover{background:var(--brand-dark);}
.chat-send svg{width:16px;height:16px;stroke:#fff;fill:none;stroke-width:2.5;}
.no-chat{flex:1;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:12px;color:var(--g400);background:var(--g50);}
.no-chat svg{width:48px;height:48px;stroke:var(--g200);fill:none;}

/* DETAIL */
.detail-layout{display:grid;grid-template-columns:1fr 340px;gap:26px;align-items:start;}
.detail-gallery{border-radius:var(--rxl);height:300px;display:flex;align-items:center;justify-content:center;margin-bottom:18px;}
.detail-gallery svg{width:90px;height:90px;opacity:.35;fill:none;}
.detail-name{font-size:26px;font-weight:700;color:var(--g900);margin-bottom:8px;line-height:1.2;}
.detail-tags{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:18px;}
.detail-desc{font-size:14px;color:var(--g600);line-height:1.7;margin-bottom:18px;background:var(--g50);padding:14px;border-radius:var(--r);}
.detail-sec{font-size:14px;font-weight:700;color:var(--g900);margin-bottom:9px;margin-top:18px;}
.rules{display:flex;flex-direction:column;gap:9px;}
.rule-item{display:flex;align-items:center;gap:11px;font-size:13px;color:var(--g600);}
.rule-icon{width:30px;height:30px;border-radius:9px;background:var(--brand-light);display:flex;align-items:center;justify-content:center;flex-shrink:0;}

/* ── Storage ── */
function getUsers(){try{return JSON.parse(localStorage.getItem(USERS_KEY)||'[]')}catch{return[]}}
function saveUsers(u){localStorage.setItem(USERS_KEY,JSON.stringify(u))}
function getSession(){try{return JSON.parse(sessionStorage.getItem(SESSION_KEY)||'null')}catch{return null}}
function saveSession(u){if(u)sessionStorage.setItem(SESSION_KEY,JSON.stringify(u));else sessionStorage.removeItem(SESSION_KEY)}
function getUserItems(){try{return JSON.parse(localStorage.getItem('sh-myitems-v3')||'[]')}catch{return[]}}
function saveUserItems(i){localStorage.setItem('sh-myitems-v3',JSON.stringify(i))}

/* ── Toast ── */
function toast(msg,type=''){
  const t=document.getElementById('toast');
  t.className='toast'+(type?' '+type:'');
  t.textContent=msg;
  t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2800);
}

/* ── Loading ── */
function loading(show){document.getElementById('gsi-overlay').classList.toggle('show',show);}

/* ── Google OAuth ── */
function initGSI(){
  if(!window.google){setTimeout(initGSI,300);return;}
  google.accounts.id.initialize({client_id:CLIENT_ID,callback:handleGoogleCredential,auto_select:false,cancel_on_tap_outside:true,ux_mode:'popup'});
  gsiReady=true;
}
function handleGoogleCredential(response){
  loading(false);
  try{
    const payload=JSON.parse(atob(response.credential.split('.')[1].replace(/-/g,'+').replace(/_/g,'/')));
    let user={id:'g_'+payload.sub,name:payload.name,email:payload.email,picture:payload.picture||null,building:'לא צוין',pass:null,karma:20,createdAt:new Date().toLocaleDateString('he-IL'),provider:'google',googleId:payload.sub};
    const users=getUsers();
    let existing=users.find(u=>u.googleId===user.googleId||u.email===user.email);
    if(existing){existing.picture=user.picture||existing.picture;existing.name=user.name;saveUsers(users);user=existing;}
    else{users.push(user);saveUsers(users);}
    saveSession(user);currentUser=user;
    toast('ברוך הבא, '+user.name+'! 🎉','success');
    setTimeout(()=>renderScreen('home'),500);
  }catch(e){toast('שגיאה בהתחברות עם Google','error');}
}
function doGoogle(){
  if(!gsiReady||!window.google){toast('Google עדיין נטען...');setTimeout(initGSI,100);return;}
  loading(true);
  google.accounts.id.prompt(n=>{if(n.isNotDisplayed()||n.isSkippedMoment()){loading(false);toast('אפשר Third-party sign-in בדפדפן ונסה שוב','error');}});
}

/* ── Email auth ── */
function doRegister(){
  const n=document.getElementById('r-name')?.value.trim();
  const e=document.getElementById('a-email')?.value.trim().toLowerCase();
  const b=document.getElementById('r-building')?.value.trim();
  const p=document.getElementById('a-pass')?.value;
  const err=document.getElementById('auth-err');
  err.style.display='none';
  if(!n||!e||!b||!p){err.textContent='נא למלא את כל השדות';err.style.display='block';return;}
  if(p.length<6){err.textContent='הסיסמה חייבת להכיל לפחות 6 תווים';err.style.display='block';return;}
  const users=getUsers();
  if(users.find(u=>u.email===e)){err.textContent='האימייל כבר קיים במערכת';err.style.display='block';return;}
  const user={id:Date.now(),name:n,email:e,building:b,pass:p,karma:0,createdAt:new Date().toLocaleDateString('he-IL'),provider:'email',picture:null};
  users.push(user);saveUsers(users);saveSession(user);currentUser=user;
  document.getElementById('auth-ok').textContent='ברוך הבא, '+n+'!';
  document.getElementById('auth-ok').style.display='block';
  setTimeout(()=>renderScreen('home'),700);
}
function doLogin(){
  const e=document.getElementById('a-email')?.value.trim().toLowerCase();
  const p=document.getElementById('a-pass')?.value;
  const err=document.getElementById('auth-err');
  err.style.display='none';
  if(!e||!p){err.textContent='נא להזין אימייל וסיסמה';err.style.display='block';return;}
  const users=getUsers();
  const user=users.find(u=>u.email===e&&u.pass===p);
  if(!user){err.textContent='אימייל או סיסמה שגויים';err.style.display='block';return;}
  saveSession(user);currentUser=user;
  document.getElementById('auth-ok').textContent='ברוך שובך, '+user.name+'!';
  document.getElementById('auth-ok').style.display='block';
  setTimeout(()=>renderScreen('home'),700);
}
function doLogout(){
  if(window.google&&gsiReady)google.accounts.id.disableAutoSelect();
  saveSession(null);currentUser=null;renderAuth('login');
}

/* ── Search & filter ── */
function onSearch(val){
  searchQuery=val.toLowerCase();
  filterItems();
}
function filterItems(){
  document.querySelectorAll('.item-card[data-cat]').forEach(card=>{
    const cat=card.dataset.cat;
    const title=card.dataset.title||'';
    const catMatch=currentCat==='all'||cat===currentCat;
    const searchMatch=!searchQuery||title.includes(searchQuery);
    card.style.display=(catMatch&&searchMatch)?'':'none';
  });
  const grid=document.getElementById('items-grid');
  if(grid){
    const visible=grid.querySelectorAll('.item-card:not([style*="display: none"]):not([style*="display:none"])');
    let empty=document.getElementById('items-empty');
    if(visible.length===0){
      if(!empty){empty=document.createElement('div');empty.id='items-empty';empty.className='empty-state';empty.innerHTML=`${sv(ICONS.search,'',56,56)}<p>לא נמצאו פריטים</p><span>נסה קטגוריה אחרת או מילת חיפוש שונה</span>`;grid.after(empty);}
    } else {
      if(empty)empty.remove();
    }
  }
}
function setCat(cat,el){
  currentCat=cat;
  document.querySelectorAll('.cat-chip').forEach(c=>c.classList.remove('active'));
  el.classList.add('active');
  filterItems();
}
function toggleFav(id,btn){
  const item=ITEMS.find(i=>String(i.id)===String(id));
  if(!item)return;
  item.liked=!item.liked;
  btn.classList.toggle('liked',item.liked);
  btn.querySelector('svg').style.fill=item.liked?'#EF4444':'none';
  btn.querySelector('svg').style.stroke=item.liked?'#EF4444':'#9CA3AF';
  toast(item.liked?'נוסף למועדפים ❤️':'הוסר מהמועדפים','');
}

function sendMsg(){
  const input=document.getElementById('chat-input');
  if(!input||!input.value.trim()||!activeChat)return;
  const text=input.value.trim();
  const conv=CONVERSATIONS.find(c=>c.id===activeChat);
  if(!conv)return;
  conv.messages.push({from:'me',text,time:new Date().toLocaleTimeString('he-IL',{hour:'2-digit',minute:'2-digit'})});
  conv.unread=false;
  input.value='';
  const msgs=document.getElementById('chat-msgs');
  if(msgs){
    const bubble=document.createElement('div');
    bubble.className='bubble me';
    bubble.textContent=text;
    msgs.appendChild(bubble);
    msgs.scrollTop=msgs.scrollHeight;
  }
  // simulate reply after 1.5s
  setTimeout(()=>{
    const replies=['תודה! אני אחזור אליך בהקדם 😊','מעולה, נתאם!','בסדר גמור','אני אבדוק ואחזור אליך'];
    const reply=replies[Math.floor(Math.random()*replies.length)];
    conv.messages.push({from:'them',text:reply,time:new Date().toLocaleTimeString('he-IL',{hour:'2-digit',minute:'2-digit'})});
    const m=document.getElementById('chat-msgs');
    if(m){const b=document.createElement('div');b.className='bubble them';b.textContent=reply;m.appendChild(b);m.scrollTop=m.scrollHeight;}
  },1500);
}

  err.style.display='none';
  if(!title||!cat||!loc){err.textContent='נא למלא שם פריט, קטגוריה ומיקום';err.style.display='block';return;}
  const items=getUserItems();
  items.push({title,cat,loc,desc,available:true,createdAt:new Date().toLocaleDateString('he-IL')});
  saveUserItems(items);
  if(currentUser){currentUser.karma=(currentUser.karma||0)+10;saveSession(currentUser);}
  document.getElementById('add-ok').textContent='הפריט פורסם בהצלחה! +10 נקודות קארמה 🎉';
  document.getElementById('add-ok').style.display='block';
  setTimeout(()=>renderScreen('myitems'),1200);
}

function screenExplore(){
  const cats=[
    {n:'כלי עבודה',key:'tools',c:'#EEF2FF',sc:'#4338CA',cnt:ITEMS.filter(i=>i.cat==='tools').length},
    {n:'ספרים',key:'books',c:'#FFF7ED',sc:'#C2410C',cnt:ITEMS.filter(i=>i.cat==='books').length},
    {n:'ספורט',key:'sports',c:'#F0FDF4',sc:'#15803D',cnt:ITEMS.filter(i=>i.cat==='sports').length},
    {n:'לבית',key:'home',c:'#FFF1F2',sc:'#BE123C',cnt:ITEMS.filter(i=>i.cat==='home').length},
    {n:'טכנולוגיה',key:'tech',c:'#F0F9FF',sc:'#0369A1',cnt:ITEMS.filter(i=>i.cat==='tech').length},
    {n:'אחר',key:'other',c:'#FAF5FF',sc:'#7E22CE',cnt:0},
  ];
  return wrap(`
<div style="margin-bottom:22px;"><div class="page-title">גלה קטגוריות</div><div class="page-sub">כל מה שאפשר להשאיל בשכונה</div></div>
<div class="explore-grid">
  ${cats.map(c=>`<div class="ex-card" style="background:${c.c};" onclick="currentCat='${c.key}';renderScreen('home')">
    <div style="font-size:22px;font-weight:700;color:${c.sc};">${c.n}</div>
    <div style="font-size:13px;color:${c.sc};opacity:.7;margin-top:6px;">${c.cnt} פריטים</div>
  </div>`).join('')}
</div>`,'explore');
}

function screenProfile(){
  const avLg=currentUser?.picture
    ?`<img src="${currentUser.picture}" style="width:100%;height:100%;object-fit:cover;border-radius:18px;" referrerpolicy="no-referrer"/>`
    :(currentUser?.name||'?').split(' ').map(w=>w[0]).join('').slice(0,2);
  const myItems=getUserItems();
  const karma=currentUser?.karma||0;
  const karmaMax=150;
  const karmaWidth=Math.min(100,Math.round((karma/karmaMax)*100));
  return wrap(`
<div class="profile-hdr">
  <div class="profile-av-lg">${avLg}</div>
  <div class="profile-name-lg">${currentUser?.name||''}</div>
  <div class="profile-meta">${currentUser?.building||''} · ${currentUser?.provider==='google'?'Google Account':'אימייל'} · הצטרף ${currentUser?.createdAt||''}</div>
  <div class="profile-stats">
    <div><div class="ps-num">${myItems.length}</div><div class="ps-lbl">פריטים שלי</div></div>
    <div><div class="ps-num">${CONVERSATIONS.length}</div><div class="ps-lbl">שיחות</div></div>
    <div><div class="ps-num">4.9★</div><div class="ps-lbl">דירוג</div></div>
  </div>
</div>
<div class="profile-layout">
  <div>
    <div class="sec-hdr" style="margin-bottom:12px;">הפריטים שלי <span class="see-all" onclick="renderScreen('additem')">+ הוסף פריט</span></div>
    <div class="my-items-list">
      ${myItems.length===0
        ?`<div class="empty-state">${sv(ICONS.tool,'',40,40)}<p>אין פריטים עדיין</p><span>הוסף את הפריט הראשון שלך</span></div>`
        :myItems.slice(0,3).map((item,i)=>`
        <div class="my-item-row">
          <div class="my-item-img" style="background:var(--brand-light);">${sv(ICONS.tool,'stroke="var(--brand)"',22,22)}</div>
          <div style="flex:1;min-width:0;"><div class="my-item-title">${item.title}</div><div class="my-item-sub">${item.loc}</div></div>
          <div class="my-item-actions">
            <span class="badge ${item.available?'b-green':'b-amber'}">${item.available?'פנוי':'תפוס'}</span>
            <div class="sw${item.available?'':' off'}"><div class="sw-t"></div></div>
          </div>
        </div>`).join('')}
      ${myItems.length>3?`<button class="btn btn-outline" onclick="renderScreen('myitems')" style="margin-top:8px;">ראה את כל ${myItems.length} הפריטים</button>`:''}
    </div>
  </div>
  <div>
    <div class="karma-card">
      <h3>נקודות קארמה</h3>
      <div class="karma-score">${karma}</div>
      <div class="karma-bar-bg"><div class="karma-bar" style="width:${karmaWidth}%"></div></div>
      <div class="karma-next">עוד ${karmaMax-karma} נקודות לרמה Gold ★</div>
    </div>
    <div class="sec-hdr" style="margin-bottom:10px;">הישגים</div>
    <div class="ach-grid">
      <div class="ach-card"><div class="ach-icon">${sv(ICONS.shield)}</div><span class="ach-label">שכן אמין</span></div>
      <div class="ach-card"><div class="ach-icon">${sv(ICONS.star)}</div><span class="ach-label">מצטרף מוקדם</span></div>
      <div class="ach-card"><div class="ach-icon">${sv(ICONS.user)}</div><span class="ach-label">מחבר קהילה</span></div>
      <div class="ach-card"><div class="ach-icon">${sv(ICONS.tool)}</div><span class="ach-label">מומחה כלים</span></div>
    </div>
    <button class="btn btn-outline" onclick="doLogout()" style="margin-top:8px;">${sv(ICONS.logout)}התנתק</button>
  </div>
</div>`,'profile');
}

/* ── Router ── */
function renderScreen(name, param){
  const map={
    home:screenHome,
    explore:screenExplore,
    messages:screenMessages,
    myitems:screenMyItems,
    additem:screenAddItem,
    profile:screenProfile,
    detail:()=>screenDetail(param||1),
  };
  if(map[name]){
    document.getElementById('root').innerHTML=map[name]();
    window.scrollTo(0,0);
    if(name==='messages'){
      const msgs=document.getElementById('chat-msgs');
      if(msgs)msgs.scrollTop=msgs.scrollHeight;
    }
  }
}

/* ── Auth ── */
function renderAuth(mode){
  const isReg=mode==='register';
  document.getElementById('root').innerHTML=`
<div class="auth-wrap" dir="rtl">
  <div class="auth-left">
    <h1>שתף. השאל.<br>בנה קהילה.</h1>
    <p>פלטפורמת שיתוף החפצים של השכנים שלך. כלי עבודה, ספרים, ציוד ספורט — הכל במרחק הליכה.</p>
    <div class="auth-badge">${sv('<path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/>')}<span>1,240 שכנים כבר חלק מהקהילה</span></div>
  </div>
  <div class="auth-right">
    <h2>${isReg?'צור חשבון':'ברוך הבא חזרה'}</h2>
    <p class="auth-sub">${isReg?'הצטרף לקהילת השכנים שלך':'התחבר לחשבון שלך'}</p>
    <div id="auth-err" class="msg-box msg-err" style="display:none;"></div>
    <div id="auth-ok" class="msg-box msg-ok" style="display:none;"></div>
    <button class="google-btn" onclick="doGoogle()">
      <svg width="20" height="20" viewBox="0 0 48 48"><path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/><path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/><path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/><path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.18 1.48-4.97 2.29-8.16 2.29-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/></svg>
      ${isReg?'הירשם עם Google':'התחבר עם Google'}
    </button>
    <div class="auth-div"><span>או עם אימייל</span></div>
    ${isReg?`<div class="form-group"><label class="form-label">שם מלא</label><input class="form-input" type="text" id="r-name" placeholder="ישראל ישראלי"/></div>`:''}
    <div class="form-group"><label class="form-label">אימייל</label><input class="form-input" type="email" id="a-email" placeholder="name@example.com" dir="ltr"/></div>
    ${isReg?`<div class="form-group"><label class="form-label">בניין / שכונה</label><input class="form-input" type="text" id="r-building" placeholder="בניין א', רחוב הרצל 5"/></div>`:''}
    <div class="form-group"><label class="form-label">סיסמה</label><input class="form-input" type="password" id="a-pass" placeholder="••••••••" dir="ltr"/></div>
    <button class="btn btn-primary" onclick="${isReg?'doRegister()':'doLogin()'}">${isReg?'צור חשבון':'התחבר'}</button>
    <p class="auth-switch">${isReg?'יש לך חשבון?':'אין לך חשבון?'} <a onclick="renderAuth('${isReg?'login':'register'}')">${isReg?'התחבר':'הרשם בחינם'}</a></p>
  </div>
</div>`;
  if(gsiReady)google.accounts.id.initialize({client_id:CLIENT_ID,callback:handleGoogleCredential,auto_select:false,ux_mode:'popup'});
}

/* ── Init ── */
function init(){
  const s=getSession();
  if(s){currentUser=s;renderScreen('home');}
  else renderAuth('login');
  setTimeout(initGSI,200);
}
init();
</script>
</body>
</html>
